name: Build and publish APK

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - name: Install Android SDK
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Install full Android API jar
        run: curl --fail --location --retry 3 --output "$ANDROID_HOME/platforms/android-36/android.jar" "https://raw.githubusercontent.com/Reginer/aosp-android-jar/main/android-36/android.jar"

      - name: Restore signing identity
        env:
          DEBUG_KEYSTORE_BASE64: ${{ secrets.DEBUG_KEYSTORE_BASE64 }}
        run: |
          mkdir -p "$HOME/.android"
          printf '%s' "$DEBUG_KEYSTORE_BASE64" | base64 --decode > "$HOME/.android/debug.keystore"

      - name: Build signed APK
        run: ./gradlew :app:assembleDebug

      - name: Verify OTA signing identity
        run: |
          "$ANDROID_HOME/build-tools/36.0.0/apksigner" verify --print-certs app/build/outputs/apk/debug/app-debug.apk | tee signing-report.txt
          grep --fixed-strings --quiet "784be02ecb5b5144008282db33e61ba285dbfcd508ff834e0905f7941b3872c9" signing-report.txt

      - name: Prepare release asset
        run: cp app/build/outputs/apk/debug/app-debug.apk "Pixel-IMS-5G-${GITHUB_REF_NAME:-manual}.apk"

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 || gh release create "$GITHUB_REF_NAME" --generate-notes --title "Pixel IMS 5G $GITHUB_REF_NAME"
          gh release upload "$GITHUB_REF_NAME" "Pixel-IMS-5G-${GITHUB_REF_NAME}.apk" --clobber

      - uses: actions/upload-artifact@v4
        with:
          name: Pixel-IMS-5G-APK
          path: Pixel-IMS-5G-*.apk
